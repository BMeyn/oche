name: Release & Deploy

# On push to main: run tests, let semantic-release decide if there is a release,
# tag + bump version, then build the image and deploy to the VPS — all in one run.
# This avoids the GITHUB_TOKEN no-chain rule that previously kept tag-pushes from
# triggering a separate deploy workflow.
#
# workflow_dispatch with `tag` input redeploys an existing tag (no new release).
# workflow_dispatch with empty `tag` re-runs the release flow on current main
# (e.g. to retry a failed earlier deploy where no new commits warrant a tag).

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to redeploy (e.g. v1.1.0). Leave blank to release HEAD of main."
        required: false

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

# Prevent overlapping deploys clobbering each other on the VPS.
concurrency:
  group: release-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    name: Test, release, build, deploy
    runs-on: ubuntu-latest
    # Don't loop on the bot's own version-bump commit. Belt-and-suspenders:
    # GITHUB_TOKEN-pushed commits already don't trigger workflows.
    if: "github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, 'chore(release)')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: ${{ inputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      # Path A: push to main, OR manual dispatch without a tag → run semantic-release.
      - name: Semantic release
        if: inputs.tag == ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx --yes \
            -p semantic-release@24 \
            -p @semantic-release/changelog@6 \
            -p @semantic-release/git@10 \
            -p @semantic-release/exec@6 \
            semantic-release

      # Path B: manual dispatch with an existing tag → set NEW_VERSION from input.
      - name: Use tag from manual input
        if: inputs.tag != ''
        run: |
          TAG="${{ inputs.tag }}"
          echo "NEW_VERSION=${TAG#v}" >> "$GITHUB_ENV"

      # Manual dispatch with empty tag and no new version warranted → redeploy
      # the version currently in package.json (i.e. the latest released version).
      - name: Fallback to package.json version (manual rerun)
        if: env.NEW_VERSION == '' && github.event_name == 'workflow_dispatch'
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "No new release from semantic-release. Redeploying current version v${VERSION}."
          echo "NEW_VERSION=${VERSION}" >> "$GITHUB_ENV"

      # Push to main with no release-worthy commits → bail cleanly.
      - name: No release — exit
        if: env.NEW_VERSION == ''
        run: |
          echo "semantic-release decided no version bump is warranted. Skipping deploy."
          exit 0

      - name: Normalize image name to lowercase
        if: env.NEW_VERSION != ''
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        if: env.NEW_VERSION != ''
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: env.NEW_VERSION != ''
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        if: env.NEW_VERSION != ''
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.NEW_VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            APP_COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy via SSH
        if: env.NEW_VERSION != ''
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /root/oche

            VERSION="${{ env.NEW_VERSION }}"

            # Pull latest compose/migration files
            git pull origin main

            # Pin docker-compose.prod.yml to the exact version we just published.
            # Stored separately from .env so a manual rollback is just:
            #   echo "OCHE_VERSION=1.2.2" > .env.version && docker compose ... up -d app
            echo "OCHE_VERSION=${VERSION}" > .env.version

            # Pull the new image
            docker compose --env-file .env --env-file .env.version \
              -f docker-compose.yml -f docker-compose.prod.yml pull app

            # Restart the app service (db and caddy stay up)
            docker compose --env-file .env --env-file .env.version \
              -f docker-compose.yml -f docker-compose.prod.yml up -d app

            # Wait for the app to be healthy
            echo "Waiting for app to become healthy..."
            for i in $(seq 1 30); do
              if docker inspect --format='{{.State.Health.Status}}' oche-app-1 2>/dev/null | grep -q healthy; then
                echo "App is healthy!"
                break
              fi
              if [ "$i" = "30" ]; then
                echo "App did not become healthy within 60s"
                exit 1
              fi
              sleep 2
            done

            # Run migrations (idempotent)
            docker compose --env-file .env --env-file .env.version \
              -f docker-compose.yml -f docker-compose.prod.yml exec -T app node scripts/migrate.mjs

            echo "Deployed v${VERSION} successfully"
