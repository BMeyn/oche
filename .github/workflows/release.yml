name: Release & Deploy

# Triggered by tag-on-main.yml pushing a v* tag.
# Builds the image, tags it as both vX.Y.Z and latest in GHCR, then SSHs to
# the VPS, writes the version to .env.version (so docker-compose pins to a
# specific tag — rollback-friendly), pulls, restarts, and migrates.
#
# workflow_dispatch lets you re-run a deploy manually against an existing tag
# from the Actions UI without having to push a new tag.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Prevent overlapping deploys clobbering each other on the VPS.
concurrency:
  group: release-deploy
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /root/oche

            VERSION="${{ needs.build-and-push.outputs.version }}"

            # Pull latest compose/migration files
            git pull origin main

            # Pin docker-compose.prod.yml to the exact version we just published.
            # Stored separately from .env so a manual rollback is just:
            #   echo "OCHE_VERSION=1.2.2" > .env.version && docker compose ... up -d app
            echo "OCHE_VERSION=${VERSION}" > .env.version

            # Pull the new image
            docker compose --env-file .env --env-file .env.version \
              -f docker-compose.yml -f docker-compose.prod.yml pull app

            # Restart the app service (db and caddy stay up)
            docker compose --env-file .env --env-file .env.version \
              -f docker-compose.yml -f docker-compose.prod.yml up -d app

            # Wait for the app to be healthy
            echo "Waiting for app to become healthy..."
            for i in $(seq 1 30); do
              if docker inspect --format='{{.State.Health.Status}}' oche-app-1 2>/dev/null | grep -q healthy; then
                echo "App is healthy!"
                break
              fi
              if [ "$i" = "30" ]; then
                echo "App did not become healthy within 60s"
                exit 1
              fi
              sleep 2
            done

            # Run migrations (idempotent)
            docker compose --env-file .env --env-file .env.version \
              -f docker-compose.yml -f docker-compose.prod.yml exec -T app node scripts/migrate.mjs

            echo "Deployed v${VERSION} successfully"
