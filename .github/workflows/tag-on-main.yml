name: Tag on main

# Runs after every push to main. Reads commit messages since the last v*
# tag, decides whether a release is warranted (Conventional Commits → SemVer),
# bumps package.json + CHANGELOG, and pushes a new tag — which then triggers
# release.yml to build the image and deploy to the VPS.
#
# Skips silently when the only commits are chore/docs/style/refactor/test/ci.

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Compute version & tag
    runs-on: ubuntu-latest
    # Don't loop on the bot's own version-bump commit.
    if: "!contains(github.event.head_commit.message, 'chore(release)')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx --yes -p semantic-release@24 -p @semantic-release/changelog@6 -p @semantic-release/git@10 semantic-release
