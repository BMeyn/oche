# OCHE — production-style local & VPS stack
#
# Spins up:
#   - app     : the Next.js scoring app (port 3000, internal)
#   - db      : Postgres 16 (data persisted in named volume)
#   - grafana : monitoring dashboard, talks to db (admin-auth gated)
#   - caddy   : reverse proxy fronting app + grafana (ports 80 / 443)
#
# Local:  docker compose up -d  →  http://localhost
# VPS:    same — open ports 80/443 in your firewall, point at server IP

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: oche:latest
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://${POSTGRES_USER:-oche}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-oche}
      - APP_URL=${APP_URL:-https://oche.cloud}
      - AUTH_SECRET=${AUTH_SECRET}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_DOMAIN=${RESEND_FROM_DOMAIN}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3000"
    networks:
      - oche-net

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-oche}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-oche}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oche} -d ${POSTGRES_DB:-oche}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Exposes Postgres to the host on localhost only — safe for local dev,
    # but do NOT uncomment this on a public VPS without a firewall rule.
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - oche-net

  grafana:
    image: grafana/grafana-oss:11.3.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_SERVER_ROOT_URL=https://grafana.${DOMAIN}
      # Datasource provisioning reads these via env interpolation.
      - POSTGRES_USER=${POSTGRES_USER:-oche}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-oche}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    expose:
      - "3000"
    networks:
      - oche-net
    # Uncomment for local dev access without going through Caddy:
    # ports:
    #   - "127.0.0.1:3001:3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - DOMAIN=${DOMAIN:-:80}
    depends_on:
      - app
      - grafana
    networks:
      - oche-net

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
  grafana-data:

networks:
  oche-net:
    driver: bridge
